apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: voting-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.votingApp.gitRepoURL }}
    targetRevision: main
    path: terraform/eks-deployment/gitops/apps/voting-app
    helm:
      valuesObject:
        gateway:
          enabled: true
        clusterIssuerName: {{ .Values.duckdns.clusterIssuer.name }}
  destination:
    server: https://kubernetes.default.svc
    namespace: voting-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true