{{- if .Values.gateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "votingApp.fullname" . }}-gateway
  labels:
    {{- include "votingApp.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.clusterIssuerName | quote }}
spec:
  gatewayClassName: {{ .Values.gateway.gatewayClassName }}
  listeners:
    {{- range .Values.gateway.listeners }}
    - name: {{ .name }}
      protocol: {{ .protocol }}
      port: {{ .port }}
      {{- if .hostname }}
      hostname: {{ .hostname }}
      {{- end }}
      {{- if eq .protocol "HTTPS" }}
      tls:
        mode: Terminate
        certificateRefs:
          {{- range .certificateSecretNames }}
          - name: {{ . | quote }}
            kind: Secret
          {{- end }}
      {{- end }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- end -}}
{{- end -}}