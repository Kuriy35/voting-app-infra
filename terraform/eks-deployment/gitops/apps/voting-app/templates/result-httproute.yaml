{{- if .Values.gateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "votingApp.fullname" . }}-result
  labels:
    app: result
    {{- include "votingApp.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "votingApp.fullname" . }}-gateway
  {{- with .Values.gateway.routing.result }}
  {{- if .hostname }}
  hostnames:
    - {{ .hostname | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .path }}
      backendRefs:
        - name: {{ include "votingApp.fullname" $ }}-result-svc
          port: {{ $.Values.result.service.externalPort }}
  {{- end -}}
{{- end -}}