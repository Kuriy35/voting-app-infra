{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "votingApp.fullname" . }}-ingress
  labels:
    {{- include "votingApp.labels" . | nindent 4 }}
  annotations:
    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.scheme }}
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}, {"HTTPS":443}]'
    # alb.ingress.kubernetes.io/ssl-redirect: 443
    # alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.certificateArn | quote }}
spec:
  ingressClassName: alb
  rules:
    {{- if .Values.ingress.hosts.vote }}
    - host: {{ .Values.ingress.hosts.vote | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "votingApp.fullname" . }}-vote-svc
                port:
                  number: {{ .Values.vote.service.externalPort }}
    {{- end }}
    {{- if .Values.ingress.hosts.result }}
    - host: {{ .Values.ingress.hosts.result | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "votingApp.fullname" . }}-result-svc
                port:
                  number: {{ .Values.result.service.externalPort }}
    {{- end }}
{{- end -}}