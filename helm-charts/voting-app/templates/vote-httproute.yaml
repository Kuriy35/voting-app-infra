{{- if .Values.gateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "votingApp.fullname" . }}-vote
  labels:
    app: vote
    {{- include "votingApp.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "votingApp.fullname" . }}-gateway
  {{- with .Values.gateway.vote.result }}
  {{- if .hostname }}
  hostnames:
    - {{ .hostname | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .path }}
      backendRefs:
        - name: {{ include "votingApp.fullname" . }}-vote-svc
          port: {{ .Values.vote.service.externalPort }}
  {{- end -}}
{{- end -}}