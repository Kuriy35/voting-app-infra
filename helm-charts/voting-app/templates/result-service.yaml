apiVersion: v1
kind: Service
metadata:
  name: {{ include "votingApp.fullname" . }}-result-svc
  labels:
    app: result
    {{- include "votingApp.labels" . | nindent 4 }}
spec:
  selector:
    app: result
  {{- with .Values.result.service }}
  type: {{ .type }}
  ports:
    - port: {{ .externalPort }}
      targetPort: {{ .internalPort }}
      protocol: TCP
      {{- if eq .type "NodePort" -}}
      nodePort: {{ .nodePort }}
      {{- end -}}
      {{- if not (empty .name) }}
      name: {{ .name }}
      {{- end -}}
  {{- end -}}